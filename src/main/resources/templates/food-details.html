<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Food Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family:Arial,sans-serif;
            background:#f6f6fb;
            margin:0;
            padding:0;
        }
        .container{
            max-width:900px;
            margin:40px auto;
            background:#fff;
            border-radius:16px;
            box-shadow:0 8px 30px rgba(0,0,0,0.08);
            overflow:hidden;
        }
        .row{
            display:flex;
            flex-wrap:wrap;
        }
        .image-box, .content-box{
            flex:1 1 400px;
            padding:25px;
        }
        .image-box img{
            width:100%;
            height:350px;
            object-fit:cover;
            border-radius:14px;
        }
        .content-box h2{
            margin-top:0;
            color:#2f1d57;
        }
        .tag{
            display:inline-block;
            background:#ffe9ee;
            color:#e53950;
            padding:6px 12px;
            border-radius:20px;
            margin-bottom:12px;
            font-size:14px;
            font-weight:600;
        }
        .price{
            font-size:28px;
            color:#3b1c5e;
            font-weight:700;
            margin:12px 0;
        }
        .form-group{
            margin:15px 0;
        }
        .form-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:16px;
        }
        .btn{
            background:#e53950;
            color:#fff;
            border:none;
            padding:12px 22px;
            border-radius:30px;
            cursor:pointer;
            font-size:16px;
            font-weight:600;
        }
        .btn:hover{
            background:#c92f43;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="image-box">
                <img th:src="@{${food.image}}" alt="Food Image">
            </div>
            <div class="content-box">
                <h2 th:text="${food.name}"></h2>
                <div class="tag" th:text="${food.category}"></div>
                <p><strong>Restaurant:</strong> <span th:text="${food.restaurantsName}"></span></p>
                <div class="price">₹ <span th:text="${food.MRP}"></span></div>
<form action="/confirmOrder" method="post" target="_blank" onsubmit="redirectHome()">
               
                    <input type="hidden" name="foodId" th:value="${food.id}">

                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" name="quantity" min="1" value="1" required>
                    </div>

                    <button type="submit" class="btn">Confirm Order</button>
                </form>
            </div>
        </div>
    </div>
    
   <script>
function redirectHome() {
    setTimeout(() => {
        window.location.href = "/";
    }, 1000); // 1 second baad redirect
}
</script>

</body>
</html>
